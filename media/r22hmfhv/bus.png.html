                color: #356066;
            }
    
            .error .sub-head {

                position: relative

                background-color: #356066;

                left: 0;
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                width: 100%;
                z-index: -1
            }
    
            .error .sub-head span {
                background-color: #fff;
                display: inline-block;
                font-size: 18px;
                font-weight: 500;
                line-height: 1.33;
                padding-right: 18px;
                text-transform: uppercase
            }

                overflow: hidden;
                position: relative;
                text-align: center;

                background: transparent;
                border-color: #356066;
            }
            .btn-primary:hover a {
                color: #356066;
